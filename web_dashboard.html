<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安全帽监控平台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', 'Segoe UI', sans-serif; background: #eef2f7; color: #111827; min-height: 100vh; }
        a { color: inherit; text-decoration: none; }
        button { cursor: pointer; }
        .page { max-width: 1120px; margin: 0 auto; padding: 24px 20px 40px; }
        .header { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 12px; margin-bottom: 18px; }
        .brand { font-size: 34px; font-weight: 800; color: #111827; letter-spacing: 0.02em; }
        .subtitle { font-size: 14px; color: #475569; margin-top: 0; max-width: 720px; line-height: 1.6; }
        .weather-tag { display: inline-flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 18px; background: #ffffff; border: 1px solid #dbeafe; box-shadow: 0 20px 45px rgba(15,23,42,.08); font-size: 14px; color: #0f172a; }
        .weather-icon { font-size: 22px; }
        .list-wrapper { background: #f3f7fb; border-radius: 24px; padding: 18px; }
        .list-title { font-size: 15px; font-weight: 700; color: #111827; margin-bottom: 14px; }
        .list-row { display: grid; grid-template-columns: 44px 1.1fr 2fr 1.5fr 130px; gap: 12px; align-items: center; padding: 14px 16px; background: #ffffff; border-radius: 16px; border: 1px solid #e2e8f0; margin-bottom: 12px; font-size: 13px; color: #334155; }
        .status-circle { width: 16px; height: 16px; border-radius: 50%; cursor: pointer; transition: transform .2s ease; }
        .status-circle:hover { transform: scale(1.08); }
        .tool-info { display: flex; flex-direction: column; gap: 4px; }
        .tool-detail-link { color: #2563eb; font-size: 12px; font-weight: 600; cursor: pointer; }
        .tool-detail-link.disabled { color: #94a3b8; pointer-events: none; }
        .tool-dialog { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(15,23,42,.6); z-index: 55; }
        .tool-dialog.open { display: flex; }
        .tool-card { width: min(92vw, 420px); background: #ffffff; border-radius: 24px; padding: 24px; box-shadow: 0 32px 70px rgba(15,23,42,.22); }
        .tool-title { font-size: 20px; font-weight: 800; color: #111827; margin-bottom: 14px; }
        .tool-text { color: #475569; line-height: 1.8; margin-bottom: 20px; }
        .close-button { width: 100%; padding: 12px 0; border: none; border-radius: 16px; background: #2563eb; color: #ffffff; font-weight: 700; }
        .status-circle.green { background: #22c55e; box-shadow: 0 0 0 4px rgba(34,197,94,.12); }
        .status-circle.yellow { background: #f59e0b; box-shadow: 0 0 0 4px rgba(245,158,11,.12); }
        .status-circle.red { background: #ef4444; box-shadow: 0 0 0 6px rgba(239,68,68,.16); }
        .helmet-info { display: flex; flex-direction: column; gap: 4px; }
        .helmet-name { font-weight: 700; color: #0f172a; }
        .helmet-sub { color: #64748b; font-size: 12px; }
        .gps-link { color: #2563eb; font-size: 12px; font-weight: 600; }
        .gps-link.disabled { color: #94a3b8; pointer-events: none; }
        .action-button { min-height: 34px; padding: 0 18px; border-radius: 999px; border: none; background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%); color: #ffffff; font-size: 12px; font-weight: 700; transition: transform .2s ease, box-shadow .2s ease; }
        .action-button:hover { transform: translateY(-1px); box-shadow: 0 10px 22px rgba(37,99,235,.18); }
        .small-info { font-size: 12px; color: #64748b; margin-top: 4px; }
        .alarm-dialog { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(15,23,42,.6); z-index: 50; }
        .alarm-dialog.open { display: flex; }
        .alarm-card { width: min(92vw, 420px); background: #ffffff; border-radius: 24px; padding: 24px; box-shadow: 0 32px 70px rgba(15,23,42,.22); }
        .alarm-title { font-size: 20px; font-weight: 800; color: #111827; margin-bottom: 14px; }
        .alarm-text { color: #475569; line-height: 1.8; margin-bottom: 20px; }
        .alarm-button { width: 100%; padding: 12px 0; border: none; border-radius: 16px; background: #ef4444; color: #ffffff; font-weight: 700; }
        .camera-modal { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(15,23,42,.6); z-index: 60; }
        .camera-modal.open { display: flex; }
        .camera-card { width: min(92vw, 840px); background: #fff; border-radius: 24px; overflow: hidden; box-shadow: 0 32px 70px rgba(15,23,42,.22); }
        #debugPanel { background:#fff; border-radius:12px; padding:10px 14px; margin-bottom:12px; border:1px solid #e6eef8; color:#334155; font-size:13px; }
        #debugPanel div { margin: 2px 0; }
        #configPanel { background:#fff; border-radius:12px; padding:12px 14px; margin-bottom:12px; border:1px solid #e6eef8; }
        .config-row { display:flex; gap:12px; flex-wrap:wrap; align-items:center; }
        .config-item { display:flex; flex-direction:column; }
        .config-item label { font-size:12px; color:#64748b; }
        .config-item input { padding:4px 8px; border:1px solid #e2e8f0; border-radius:6px; font-size:12px; }
        .btn-apply { padding:4px 12px; border:none; border-radius:6px; background:#2563eb; color:#fff; font-size:12px; font-weight:600; height:28px; align-self:flex-end; cursor:pointer; }
        .btn-apply:hover { background:#1d4ed8; }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <div>
                <div class="brand">安全帽监控平台</div>
                <div class="subtitle">通过 OneNET 云平台实时展示人员安全状态与定位</div>
            </div>
            <div class="weather-tag">
                <span class="weather-icon" id="weatherIcon">☁️</span>
                <div>
                    <div id="temperature">--°C</div>
                    <div id="city">未知</div>
                </div>
            </div>
        </div>

        <div style="margin-bottom: 10px; color: #475569; font-size: 13px;">
            数据状态：<span id="dataStatus" style="font-weight:600;">正在获取...</span>
        </div>

        <div id="configPanel">
            <div style="font-size:13px; font-weight:600; color:#334155; margin-bottom:8px;">平台配置</div>
            <div class="config-row">
                <div class="config-item">
                    <label>产品ID</label>
                    <input type="text" id="configProductId" value="U1eOLJ83ky" style="width:120px;" />
                </div>
                <div class="config-item">
                    <label>设备名称</label>
                    <input type="text" id="configDeviceName" value="MAOZI" style="width:100px;" />
                </div>
                <div class="config-item">
                    <label>API Key</label>
                    <input type="text" id="configApiKey" value="cbOnk40RLVF7ldcXxZUJhXdR+c9HWeNnG83LGZWNrYU=" style="width:280px;" />
                </div>
                <button class="btn-apply" onclick="applyConfig()">应用配置</button>
            </div>
        </div>

        <div id="debugPanel">
            <div id="lastPayload">最近数据: 等待中...</div>
            <div id="rawLatLon">原始坐标: --, --</div>
        </div>

        <div class="list-wrapper">
            <div class="list-title">安全帽信息列表</div>
            <div class="list-row" id="helmetRow">
                <div class="status-circle green" id="statusLight" title="点击恢复状态" onclick="restoreStatus()"></div>
                <div class="helmet-info">
                    <div class="helmet-name" id="helmetName">张三</div>
                    <div class="helmet-sub" id="helmetStatusText">当前状态：正常</div>
                </div>
                <div class="helmet-info">
                    <div class="helmet-sub">当前地址：</div>
                    <a id="gpsLink" class="gps-link disabled" href="#" target="_blank">未知</a>
                </div>
                <div class="tool-info">
                    <div class="helmet-sub">工具：<span id="toolStatus">工具缺失</span></div>
                    <a id="toolDetailLink" class="tool-detail-link disabled" href="#" onclick="openToolDetail(event)">查看缺少工具</a>
                </div>
                <button class="action-button" onclick="openCameraPreview()">查看摄像头</button>
            </div>
            <div class="small-info" id="sensorTime">更新时间: --</div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div class="alarm-dialog" id="alarmDialog">
        <div class="alarm-card">
            <div class="alarm-title" id="alarmTitle">张三摔倒了</div>
            <div class="alarm-text" id="alarmMessage">检测到张三发生摔倒，请立即检查现场并确认人员安全。</div>
            <button class="alarm-button" onclick="closeAlarmDialog()">我知道了</button>
        </div>
    </div>

    <div class="tool-dialog" id="toolDialog">
        <div class="tool-card">
            <div class="tool-title">缺失工具详情</div>
            <div class="tool-text" id="toolDetailText">当前没有检测到缺失工具。</div>
            <button class="close-button" onclick="closeToolDetail()">关闭</button>
        </div>
    </div>

    <div class="camera-modal" id="cameraModal">
        <div class="camera-card">
            <div style="display:flex;justify-content:space-between;align-items:center;padding:18px 22px;border-bottom:1px solid #e2e8f0;">
                <div style="font-weight:700;color:#111827;font-size:16px;">安全帽摄像头实时预览</div>
                <button style="border:none;background:transparent;color:#475569;font-size:22px;cursor:pointer;" onclick="closeCameraPreview()">×</button>
            </div>
            <div style="padding:24px;background:#f8fafc;min-height:320px;display:grid;place-items:center;color:#475569;font-size:15px;">摄像头视频流区域（请替换为真实视频流地址）</div>
        </div>
    </div>

    <script>
        // ================================================================
        // 配置
        // ================================================================
        const TOOL_NAMES = ['扳手', '内六角扳手', '测电笔', '尺子', '螺丝刀1', '螺丝刀10', '胶带', '锤子'];
        const amapKey = '00557b66102c547262723d7b8ee2af2c';
        const geocodeMinIntervalMs = 5 * 60 * 1000;

        let lastGeocodeTime = 0;
        let lastGeocodeLoc = '';
        const geocodeCache = new Map();
        let currentStatus = 'normal';
        let missingTools = [];
        let updateInterval = null;

        function getConfig() {
            return {
                productId: document.getElementById('configProductId').value.trim(),
                deviceName: document.getElementById('configDeviceName').value.trim(),
                apiKey: document.getElementById('configApiKey').value.trim()
            };
        }

        function applyConfig() {
            clearInterval(updateInterval);
            fetchData();
            updateInterval = setInterval(fetchData, 3000);
            document.getElementById('dataStatus').textContent = '配置已更新，正在获取...';
        }

        // ================================================================
        // 数据拉取（使用 api-key 头部）
        // ================================================================
        async function fetchData() {
            const cfg = getConfig();
            const url = `https://iot-api.heclouds.com/thingmodel/query-device-property?product_id=${encodeURIComponent(cfg.productId)}&device_name=${encodeURIComponent(cfg.deviceName)}`;

            try {
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                        'api-key': cfg.apiKey   // ← 关键改动：使用 api-key
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const result = await response.json();
                console.log('API响应:', result);

                if (result.code === 0 && result.data && result.data.properties) {
                    const dataMap = {};
                    result.data.properties.forEach(prop => {
                        dataMap[prop.id] = prop.value;
                    });

                    const sensorData = {
                        lat: 0, lon: 0,
                        temp: dataMap.wendu || '--',
                        weather: '',
                        city: '未知',
                        baojing: dataMap.baojing === true || dataMap.baojing === 'true',
                        toudeng: dataMap.toudeng === true || dataMap.toudeng === 'true',
                        tools: [
                            dataMap.banshou === true || dataMap.banshou === 'true',
                            dataMap.neiliujiao === true || dataMap.neiliujiao === 'true',
                            dataMap.cedianbi === true || dataMap.cedianbi === 'true',
                            dataMap.chizi === true || dataMap.chizi === 'true',
                            dataMap.luosidao1 === true || dataMap.luosidao1 === 'true',
                            dataMap.luosidao10 === true || dataMap.luosidao10 === 'true',
                            dataMap.jiaodai === true || dataMap.jiaodai === 'true',
                            dataMap.chuizi === true || dataMap.chuizi === 'true'
                        ]
                    };

                    updateUI(sensorData);
                    document.getElementById('dataStatus').textContent = '已连接（HTTP）';
                    document.getElementById('lastPayload').textContent = '最近数据: ' + JSON.stringify(sensorData);
                } else {
                    document.getElementById('dataStatus').textContent = '获取失败: ' + (result.msg || '未知错误');
                    console.warn('API返回:', result);
                }
            } catch (error) {
                console.error('获取数据失败:', error);
                document.getElementById('dataStatus').textContent = '获取失败，重试中...';
            }
        }

        // ================================================================
        // UI 更新（保持不变）
        // ================================================================
        function updateUI(data) {
            document.getElementById('temperature').textContent = data.temp ? data.temp + '°C' : '--°C';
            document.getElementById('city').textContent = data.city || '未知';
            document.getElementById('weatherIcon').textContent = getWeatherIcon(data.weather);
            document.getElementById('sensorTime').textContent = '更新时间: ' + new Date().toLocaleString('zh-CN');
            updateGPS(data.lat, data.lon);

            if (data.baojing) {
                if (currentStatus !== 'fall') {
                    currentStatus = 'fall';
                    setLamp('red');
                    setHelmetStatus('当前状态：摔倒警报');
                    document.getElementById('alarmTitle').textContent = '张三摔倒了';
                    document.getElementById('alarmMessage').textContent = '检测到张三发生摔倒，请立即检查现场并确认人员安全。';
                    document.getElementById('alarmDialog').classList.add('open');
                }
            } else {
                if (currentStatus !== 'normal') {
                    currentStatus = 'normal';
                    setLamp('green');
                    setHelmetStatus('当前状态：正常');
                    document.getElementById('alarmDialog').classList.remove('open');
                }
            }

            const toolArray = data.tools || [];
            const missingToolNames = toolArray.map((v, i) => !v ? TOOL_NAMES[i] : null).filter(n => n);
            updateToolInfo(missingToolNames);

            if (!data.baojing && missingToolNames.length > 0) {
                if (currentStatus !== 'lost_tool') {
                    currentStatus = 'lost_tool';
                    setLamp('yellow');
                    setHelmetStatus('当前状态：工具丢失');
                    document.getElementById('alarmTitle').textContent = '张三工具丢失';
                    document.getElementById('alarmMessage').textContent = '检测到工具遗失，请尽快确认安全帽位置。';
                    document.getElementById('alarmDialog').classList.add('open');
                }
            }
        }

        function updateToolInfo(missing) {
            const toolStatus = document.getElementById('toolStatus');
            const detailLink = document.getElementById('toolDetailLink');
            if (missing && missing.length > 0) {
                toolStatus.textContent = missing.join('、');
                missingTools = missing;
                detailLink.classList.remove('disabled');
                detailLink.href = '#';
            } else {
                toolStatus.textContent = '工具齐全';
                missingTools = [];
                detailLink.classList.add('disabled');
                detailLink.removeAttribute('href');
            }
        }

        function updateGPS(lat, lon) {
            const gpsLink = document.getElementById('gpsLink');
            if (lat === 0 && lon === 0) {
                gpsLink.href = '#';
                gpsLink.textContent = '未知（未定位）';
                gpsLink.classList.add('disabled');
                gpsLink.removeAttribute('target');
                document.getElementById('rawLatLon').textContent = '原始坐标: --, --';
            } else {
                gpsLink.href = `https://www.google.com/maps?q=${lat},${lon}`;
                gpsLink.classList.remove('disabled');
                gpsLink.target = '_blank';
                document.getElementById('rawLatLon').textContent = `原始坐标: ${lat}, ${lon}`;
                getAddressFromAMap(lat, lon).then(addr => {
                    if (addr) gpsLink.textContent = addr;
                }).catch(() => {});
            }
        }

        async function getAddressFromAMap(lat, lon) {
            if (!lat || !lon) return null;
            const locKey = `${lat.toFixed(5)},${lon.toFixed(5)}`;
            if (geocodeCache.has(locKey)) return geocodeCache.get(locKey);
            const now = Date.now();
            if ((now - lastGeocodeTime) < geocodeMinIntervalMs) {
                if (geocodeCache.has(lastGeocodeLoc)) return geocodeCache.get(lastGeocodeLoc);
                return null;
            }
            const url = `https://restapi.amap.com/v3/geocode/regeo?key=${amapKey}&location=${lon},${lat}&radius=100&extensions=base&output=json`;
            try {
                const resp = await fetch(url);
                const json = await resp.json();
                if (json && (json.status === '1' || json.status === 1) && json.regeocode) {
                    const addr = json.regeocode.formatted_address || '';
                    geocodeCache.set(locKey, addr);
                    lastGeocodeTime = now;
                    lastGeocodeLoc = locKey;
                    return addr;
                }
            } catch (e) {
                console.error(e);
            }
            return null;
        }

        function setLamp(color) {
            document.getElementById('statusLight').className = `status-circle ${color}`;
        }
        function setHelmetStatus(text) {
            document.getElementById('helmetStatusText').textContent = text;
        }
        function getWeatherIcon(weather) {
            if (!weather) return '☁️';
            const w = weather.toLowerCase();
            if (w.includes('晴')) return '☀️';
            if (w.includes('云')) return '☁️';
            if (w.includes('雨')) return '🌧️';
            if (w.includes('雪')) return '❄️';
            if (w.includes('雷')) return '⛈️';
            return '🌤️';
        }

        function openToolDetail(e) {
            e.preventDefault();
            if (!missingTools || missingTools.length === 0) return;
            document.getElementById('toolDetailText').textContent = '缺少工具：' + missingTools.join('、');
            document.getElementById('toolDialog').classList.add('open');
        }
        function closeToolDetail() {
            document.getElementById('toolDialog').classList.remove('open');
        }
        function restoreStatus() {
            if (currentStatus !== 'normal') {
                currentStatus = 'normal';
                setLamp('green');
                setHelmetStatus('当前状态：正常');
                document.getElementById('alarmDialog').classList.remove('open');
            }
        }
        function closeAlarmDialog() {
            document.getElementById('alarmDialog').classList.remove('open');
        }
        function openCameraPreview() {
            document.getElementById('cameraModal').classList.add('open');
        }
        function closeCameraPreview() {
            document.getElementById('cameraModal').classList.remove('open');
        }

        // ================================================================
        // 初始化
        // ================================================================
        window.onload = function() {
            fetchData();
            updateInterval = setInterval(fetchData, 3000);
        };
    </script>
</body>
</html>
